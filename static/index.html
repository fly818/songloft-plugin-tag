<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>标签刮削</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
<style>
/* ============ SHARED ============ */
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--md-surface-1);color:var(--md-on-surface);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--md-surface-variant);border-radius:3px}::-webkit-scrollbar-track{background:transparent}
.mi{font-size:18px;vertical-align:middle}
.btn{cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:none;font-weight:500;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:var(--md-primary);color:var(--md-on-primary);border-radius:20px;padding:10px 20px;font-size:14px}
.btn-s{background:var(--md-primary-container);color:var(--md-on-primary-container);border-radius:14px;padding:6px 14px;font-size:12px}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:14px}
.btn-stop{background:var(--md-error);color:var(--md-on-error);border-radius:20px;padding:10px 20px;font-size:14px}
.btn-stop:disabled{background:var(--md-surface-variant);color:var(--md-on-surface-variant)}
.btn-e{background:var(--md-error);color:var(--md-on-error);border-radius:14px;padding:6px 14px;font-size:12px}
.hdr{background:var(--md-primary);color:var(--md-on-primary);padding:8px 16px;display:flex;align-items:center;gap:8px;box-shadow:var(--md-shadow-2);flex-shrink:0}
.hdr h1{font-size:16px;font-weight:500}
.hdr .btn{background:color-mix(in srgb,var(--md-on-primary) 15%,transparent);color:var(--md-on-primary)}
.tabs{display:flex;gap:2px;background:color-mix(in srgb,var(--md-on-primary) 10%,transparent);border-radius:10px;padding:2px}
.tabs button{padding:6px 14px;border:none;background:none;color:var(--md-on-primary);font-size:12px;border-radius:8px;cursor:pointer;opacity:0.7}
.tabs button.on{background:color-mix(in srgb,var(--md-on-primary) 18%,transparent);opacity:1;font-weight:500}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:1000}
.mbody{background:var(--md-surface-1);border-radius:20px;padding:20px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;color:var(--md-on-surface)}
.mbody h3{font-size:16px;margin-bottom:12px}
.toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--md-primary-container);color:var(--md-on-primary-container);padding:8px 20px;border-radius:20px;font-size:13px;z-index:999}

/* ============ DESKTOP (>=601px) ============ */
@media(min-width:601px){
  body{overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  /* shared desktop container */
  #desktopWrap{display:flex;flex:1;overflow:hidden;min-height:0}
  .desk-tree{width:260px;flex-shrink:0;overflow-y:auto;background:var(--md-surface-2);border-right:1px solid var(--md-outline);padding:10px;font-size:12px;line-height:2}
  .desk-tree .tr-n{padding:3px 8px;border-radius:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--md-on-surface)}
  .desk-tree .tr-n.sel{background:var(--md-primary-container);color:var(--md-primary);font-weight:500}
  .desk-tree .tr-n:hover{background:var(--md-surface-2)}
  .desk-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .desk-top{flex-shrink:0;padding:10px 16px 0}
  .desk-top .srch{display:flex;gap:6px;margin-bottom:6px}
  .desk-top .srch input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--md-outline);font-size:13px;outline:none;background:var(--md-surface-2);color:var(--md-on-surface)}
  .desk-top .srch input:focus{border-color:var(--md-primary)}
  .desk-top .crumb{font-size:11px;color:var(--md-on-surface-variant);padding-bottom:4px}
  .desk-tbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
  .desk-tbar button{padding:4px 14px;border-radius:8px;border:1px solid var(--md-outline);background:var(--md-surface-2);font-size:12px;cursor:pointer;color:var(--md-on-surface)}
  .desk-tbar button:active{background:var(--md-primary-container)}
  .desk-tbar .sep{width:1px;height:20px;background:var(--md-surface-variant);display:inline-block;margin:0 4px}
  .desk-list{flex:1;overflow-y:auto;padding:0 16px}
  .desk-list .srow{display:flex;align-items:center;padding:10px 12px;gap:10px;border-radius:10px;cursor:pointer;color:var(--md-on-surface)}
  .desk-list .srow:active{background:var(--md-primary-container)}
  .desk-list .srow.sel{background:var(--md-primary-container)}
  .desk-list .srow input[type=checkbox]{accent-color:var(--md-primary);flex-shrink:0;margin:0;width:18px;height:18px}
  .desk-list .sinfo{flex:1;min-width:0}
  .desk-list .sinfo .t{font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .desk-list .sinfo .u{font-size:12px;color:var(--md-on-surface-variant)}
  .desk-status{border-top:1px solid var(--md-outline);padding:4px 16px;font-size:11px;color:var(--md-on-surface-variant);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .desk-bottom{flex-shrink:0;border-top:1px solid var(--md-outline);padding:10px 16px;display:flex;gap:12px;align-items:flex-start;overflow:hidden}
  .desk-bottom .log-wrap{flex:1;min-width:0}
  .desk-bottom .log-wrap h4{font-size:11px;color:var(--md-on-surface-variant);margin-bottom:4px;cursor:pointer}
  .desk-bottom .log-wrap .log{max-height:80px;overflow-y:auto;background:var(--md-surface-2);border-radius:8px;padding:4px 8px;font-size:10px;font-family:monospace;color:var(--md-on-surface)}
  .desk-bottom .log-wrap .log .e{color:var(--md-error)}
  .desk-bottom .cfg-wrap{width:320px;flex-shrink:0;overflow-y:auto;max-height:180px}
  .desk-bottom .cfg-wrap h4{font-size:11px;color:var(--md-on-surface-variant);margin-bottom:4px}
  .desk-bottom .sgrid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
  .desk-bottom .schip{padding:4px 8px;border-radius:6px;border:1px solid var(--md-outline);font-size:10px;cursor:pointer}
  .desk-bottom .schip.on{border-color:var(--md-success)}
  .desk-bottom .cfg{margin-top:4px}
  .desk-bottom .cfg label{font-size:10px;color:var(--md-on-surface-variant);display:block}
  .desk-bottom .cfg input{width:100%;padding:4px 6px;border-radius:6px;border:1px solid var(--md-outline);font-size:11px;background:var(--md-surface-2);color:var(--md-on-surface)}
  .desk-bottom .cfg .eg{display:none}
  .pbar{height:3px;background:var(--md-surface-variant);overflow:hidden;flex-shrink:0}
  .pfill{height:100%;background:var(--md-primary);transition:width .3s}
  #mblWrap,#mobileRoot{display:none!important}
}

/* ============ MOBILE (<=600px) ============ */
@media(max-width:600px){
  body{overflow-x:hidden}
  #app{display:flex;flex-direction:column;min-height:100vh}
  #desktopWrap,#desktopRoot{display:none!important}
  .hdr{padding:4px 8px;gap:4px;flex-wrap:nowrap}
  .hdr h1{font-size:12px;white-space:nowrap}
  .hdr h1 .mi{font-size:16px}
  .tabs{gap:1px;border-radius:8px;padding:1px}
  .tabs button{padding:3px 8px;font-size:10px;border-radius:6px}
  .tabs .mi{font-size:12px;display:none}
  #mblWrap{display:flex!important;gap:1px;background:color-mix(in srgb,var(--md-on-primary) 10%,transparent);border-radius:8px;padding:2px 4px;justify-content:center}
  #mblWrap button{padding:3px 8px;font-size:10px;border-radius:6px;border:none;background:none;color:var(--md-on-primary);cursor:pointer;opacity:0.7}
  #mblWrap button.on{background:color-mix(in srgb,var(--md-on-primary) 18%,transparent);opacity:1;font-weight:500}
  /* mobile root injected by JS */
  .m-top{padding:6px 8px 0;flex-shrink:0}
  .m-top .srch{display:flex;gap:4px;margin-bottom:4px}
  .m-top .srch input{flex:1;padding:8px 8px;border-radius:8px;border:1px solid var(--md-outline);font-size:13px;outline:none;background:var(--md-surface-2);color:var(--md-on-surface)}
  .m-top .crumb{font-size:10px;color:var(--md-on-surface-variant);padding-bottom:2px}
  .m-tbar{display:flex;gap:2px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
  .m-tbar button{padding:2px 6px;border-radius:6px;border:1px solid var(--md-outline);background:var(--md-surface-2);font-size:10px;cursor:pointer;color:var(--md-on-surface)}
  .m-tbar .sep{width:1px;height:14px;background:var(--md-surface-variant);display:inline-block;margin:0 2px}
  .m-tbar .m-extra{display:none}
  .m-tbar.open .m-extra{display:contents}
  .m-tbar .m-toggle{padding:2px 6px;font-size:9px;cursor:pointer;color:var(--md-primary);border:none;background:none}
  .m-list{flex:1;overflow-y:auto;padding:0 8px}
  .m-list .srow{display:flex;align-items:center;padding:8px 10px;gap:6px;border-radius:8px;cursor:pointer;color:var(--md-on-surface)}
  .m-list .srow.sel{background:var(--md-primary-container)}
  .m-list .srow input[type=checkbox]{accent-color:var(--md-primary);width:16px;height:16px;flex-shrink:0;margin:0}
  .m-list .sinfo{flex:1;min-width:0}
  .m-list .sinfo .t{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .m-list .sinfo .u{font-size:10px;color:var(--md-on-surface-variant)}
  .m-status{padding:4px 8px;font-size:10px;color:var(--md-on-surface-variant);border-top:1px solid var(--md-outline);display:flex;justify-content:space-between;flex-shrink:0}
  .m-sec{border-top:1px solid var(--md-outline);padding:8px;flex-shrink:0}
  .m-sec h4{font-size:11px;color:var(--md-on-surface-variant);margin-bottom:4px;cursor:pointer}
  .m-sec .log{max-height:60px;overflow-y:auto;background:var(--md-surface-2);border-radius:6px;padding:4px 6px;font-size:10px;font-family:monospace;color:var(--md-on-surface)}
  .m-sec .log .e{color:var(--md-error)}
  .m-sec .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .m-sec .schip{padding:6px 4px;border-radius:8px;border:1px solid var(--md-outline);font-size:10px;cursor:pointer;text-align:center}
  .m-sec .schip.on{border-color:var(--md-success)}
  .m-sec .cfg{margin-top:4px}
  .m-sec .cfg label{font-size:10px;color:var(--md-on-surface-variant);display:block}
  .m-sec .cfg input{width:100%;padding:4px 6px;border-radius:6px;border:1px solid var(--md-outline);font-size:11px;background:var(--md-surface-2);color:var(--md-on-surface)}
  .m-sec .cfg .eg{display:none}
  .pbar{height:3px;background:var(--md-surface-variant);overflow:hidden;flex-shrink:0}
  .pfill{height:100%;background:var(--md-primary);transition:width .3s}
  .fld input,.fld textarea{font-size:14px!important;padding:10px 12px!important}
}
.fld{margin-bottom:10px}.fld label{font-size:12px;color:var(--md-on-surface-variant);display:block}
.fld input,.fld textarea{width:100%;padding:8px 12px;border-radius:10px;border:1px solid var(--md-outline);font-size:14px;background:var(--md-surface-2);color:var(--md-on-surface)}
.fld textarea{min-height:60px;resize:vertical}
</style></head><body>
<div id="app">
  <div class="hdr">
    <h1><span class="material-symbols-outlined mi">music_note</span> 标签刮削 <span style="font-size:11px;opacity:0.6;font-weight:400">v1.0.7</span></h1>
    <div class="tabs" id="tabs-desktop">
      <button class="on" data-tab="songs" onclick="switchTab('songs')"><span class="material-symbols-outlined mi">music_note</span> 歌曲</button>
      <button data-tab="failed" onclick="switchTab('failed')"><span class="material-symbols-outlined mi">warning</span> 失败</button>
      <button data-tab="edit" onclick="switchTab('edit');loadEditView()"><span class="material-symbols-outlined mi">edit</span> 编辑</button>
    </div>
    <button class="btn btn-sm" onclick="loadSongs()" id="btnRefresh"><span class="material-symbols-outlined mi">refresh</span> 刷新</button>
    <button class="btn btn-sm" style="margin-left:auto" onclick="showDoc('README')" id="btnReadme"><span class="material-symbols-outlined mi">description</span> README</button>
    <button class="btn btn-sm" onclick="showDoc('CHANGELOG')" id="btnClog"><span class="material-symbols-outlined mi">history</span> 改动日志</button>
  </div>
  <div id="mblWrap" class="tabs">
    <button class="on" data-tab="songs" onclick="switchTab('songs')">歌曲</button>
    <button data-tab="failed" onclick="switchTab('failed')">失败</button>
    <button data-tab="edit" onclick="switchTab('edit');loadEditView()">编辑</button>
  </div>
  <!-- DESKTOP: built by setupDesktop() -->
  <div id="desktopRoot"></div>
  <!-- MOBILE: built by setupMobile() -->
  <div id="mobileRoot"></div>
</div>

<!-- MODALS (shared) -->
<div class="modal" id="prevModal"><div class="mbody">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px"><h3 id="prevTitle">预览</h3><button onclick="closePrev()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--md-on-surface)">✕</button></div>
  <div class="fld"><label>艺术家</label><input id="ea"></div><div class="fld"><label>标题</label><input id="et"></div><div class="fld"><label>专辑</label><input id="eb"></div>
  <div id="prevMeta" style="font-size:11px;color:var(--md-on-surface-variant);margin-bottom:8px"></div>
  <div id="prevCover" style="margin-bottom:8px"></div>
  <div style="display:flex;gap:6px"><button class="btn btn-p" onclick="applyPrev()">写入</button><button class="btn" onclick="closePrev()" style="background:var(--md-surface-2);color:var(--md-on-surface);border-radius:20px;padding:10px 20px">取消</button></div>
</div></div>
<div class="modal" id="retryModal"><div class="mbody">
  <h3><span class="material-symbols-outlined mi">refresh</span> 手动刮削</h3>
  <div class="fld"><label>艺术家（选填）</label><input id="ra"></div><div class="fld"><label>标题（选填）</label><input id="rt"></div><div class="fld"><label>搜索关键词</label><input id="rk"></div>
  <div style="display:flex;gap:6px"><button class="btn btn-p" onclick="doRetry()"><span class="material-symbols-outlined mi">search</span> 搜索</button><button class="btn btn-s" onclick="closeRetry()">取消</button></div>
  <div id="retryRes" style="margin-top:8px;max-height:200px;overflow-y:auto"></div>
</div></div>
<div class="modal" id="docModal"><div class="mbody" style="max-width:700px">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px"><h3 id="docTitle">文档</h3><button onclick="closeDoc()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--md-on-surface)">✕</button></div>
  <div style="font-size:12px;line-height:1.8;max-height:65vh;overflow-y:auto" id="docBody"></div>
</div></div>

<script>
/* ========== global state & utils ========== */
var S={songs:[],sel:new Set,cfg:{},srcStatus:{},prev:null,busy:false,retryId:0,failedSongs:[]},S_editId=0;
var E=function(id){return document.getElementById(id)};
function token(){try{if(window.SongloftPlugin)return SongloftPlugin.getAuthToken()||""}catch(e){}try{var r=localStorage.getItem("songloft-auth");if(r)return JSON.parse(r).accessToken||""}catch(e){}var p=new URLSearchParams(location.search);return p.get("access_token")||""}
async function af(u,o){o=o||{};o.headers=o.headers||{};var t=token();if(t)o.headers["Authorization"]="Bearer "+t;if(!o.headers["Content-Type"]&&o.method)o.headers["Content-Type"]="application/json";return fetch(u,o)}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function escH(s){var d={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};return(s||"").replace(/[&<>"']/g,function(c){return d[c]||c})}
function fm(s){if(!s||s<=0)return"--:--";var m=Math.floor(s/60);return m+":"+String(Math.floor(s%60)).padStart(2,"0")}
function toast(m){var e=E("toast");e.textContent=m;e.style.display="block";setTimeout(function(){e.style.display="none"},2000)}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
var isMobile=function(){return window.innerWidth<=600};
function setP(s,p){var bar=E("pbar"),fill=E("pfill");if(bar)bar.style.display=s?"":"none";if(fill)fill.style.width=p+"%"}
function log(m,l){var c=E("log");if(!c)return;var d=document.createElement("div");d.className=l==="e"?"e":"";d.textContent=new Date().toLocaleTimeString()+" "+(m||"");c.appendChild(d);c.scrollTop=c.scrollHeight;while(c.children.length>200)c.firstChild.remove()}
function findSong(id){var a=S._allSongs||S.songs;for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null}
function toggleSource(name){var cfg=S.cfg||{};cfg[name]=!cfg[name];saveCfgSilent();(['deskChip_'+name,'mblChip_'+name]).forEach(function(id){var el=document.getElementById(id);if(el)el.classList.toggle('on',cfg[name])})}
function saveCfgSilent(){af("./config",{method:"PUT",body:JSON.stringify(S.cfg)}).catch(function(){})}
var _queryElement=function(id){return E(id)}; /* override by platform */

/* ========== DESKTOP LAYOUT (JS-built) ========== */
var $d=function(id){var el=document.getElementById('d-'+id)||(id.indexOf('d-')===0?document.getElementById(id):null);return el};
var dq=function(sel){return document.querySelector('#desktopRoot '+sel)};
function buildDesktop(){
  var root=E("desktopRoot");if(!root)return;
  root.innerHTML='\
  <div id="desktopWrap">\
    <div class="desk-tree" id="d-tree"><div id="d-treeHead" style="font-size:11px;color:var(--md-on-surface-variant);border-bottom:1px solid var(--md-outline);padding-bottom:6px;margin-bottom:6px">目录</div><div id="d-treeInner"></div></div>\
    <div class="desk-main">\
      <div class="desk-top">\
        <div class="srch"><input id="d-q" placeholder="搜索（回车搜索）..." onkeydown="if(event.key==='Enter')search()"><button class="btn btn-s" onclick="search()"><span class="material-symbols-outlined mi">search</span></button></div>\
        <div class="crumb" id="d-crumb"></div>\
        <div class="desk-tbar" id="d-tbar">\
          <button onclick="showAll()" id="d-btnAll"><span class="material-symbols-outlined mi">list</span> 全部歌曲</button>\
          <button onclick="selAll()"><span class="material-symbols-outlined mi">check_box</span> 全选</button>\
          <button onclick="selNone()"><span class="material-symbols-outlined mi">check_box_outline_blank</span> 清空</button>\
          <span class=sep></span>\
          <button onclick="doScrape()" id="d-btnScrape" disabled><span class="material-symbols-outlined mi">edit_note</span> 刮削</button>\
          <button onclick="batchForce()" id="d-btnForce" disabled><span class="material-symbols-outlined mi">refresh</span> 强制</button>\
          <button id="d-btnPrev" onclick="preview()" disabled><span class="material-symbols-outlined mi">search</span> 预览</button>\
          <span class=sep></span>\
          <button onclick="dlCover()" id="d-btnDlCover" disabled><span class="material-symbols-outlined mi">download</span> 下载封面</button>\
          <button onclick="clearCover()" id="d-btnClearCover" disabled title="清除嵌入式封面"><span class="material-symbols-outlined mi">hide_image</span> 清除封面</button>\
          <button onclick="stopBatch()" id="d-btnStop" disabled class="btn-stop" style="padding:4px 14px;font-size:12px;border-radius:8px"><span class="material-symbols-outlined mi">stop</span> 停止</button>\
          <button onclick="clearScraped()"><span class="material-symbols-outlined mi">delete</span> 清空记录</button>\
        </div>\
      </div>\
      <div class="desk-list" id="d-list"></div>\
      <div class="desk-status"><span id="d-selInfo"></span><span id="d-ptxt" style="color:var(--md-primary)"></span></div>\
      <div class="pbar" id="d-pbar" style="display:none"><div class="pfill" id="d-pfill" style="width:0%"></div></div>\
      <div class="desk-bottom">\
        <div class="log-wrap"><h4 onclick="var l=E(\'d-logBody\');l.style.display=l.style.display===\'none\'?\'block\':\'none\'">▼ 日志</h4><div class="log" id="d-logBody"><div>就绪</div></div></div>\
        <div class="cfg-wrap"><h4>刮削源</h4>\
          <div class="sgrid">\
            <div class="schip" id="deskChip_acoustid" onclick="toggleSource(\'acoustid\')">AcoustID</div>\
            <div class="schip" id="deskChip_netease" onclick="toggleSource(\'netease\')">网易云</div>\
            <div class="schip" id="deskChip_qqmusic" onclick="toggleSource(\'qqmusic\')">QQ音乐</div>\
            <div class="schip" id="deskChip_kugou" onclick="toggleSource(\'kugou\')">酷狗</div>\
            <div class="schip" id="deskChip_kuwo" onclick="toggleSource(\'kuwo\')">酷我</div>\
          </div>\
          <div class="cfg"><label>AcoustID Key</label><input id="d-ak" placeholder="输入 Key"></div>\
          <div class="cfg"><label>网易云 URL</label><input id="d-nu" placeholder="输入 URL"></div>\

async function batchForce(){batch(true)}
async function clearScraped(){if(S.busy)return;if(!confirm("确定要清除所有刮削记录吗？\n清除后所有歌曲都可重新刮削。"))return;try{var r=await af("./storage/scraped",{method:"DELETE"});if(r.ok){toast("已清除刮削记录")}else{toast("清除失败")}}catch(e){log("clearScraped err:"+e.message,"e");toast("错误")}}
async function dlCover(){if(S.busy)return;var is=ids();if(!is.length){toast("请先选择歌曲");return}S.busy=true;setP(true,0);var ok=0,skip=0,fail=0,total=is.length;try{for(var i=0;i<is.length;i++){var id=is[i],s=findSong(id);if(!s){skip++;log("skip #"+id+": 歌曲未找到");continue}var cu=s.cover_url||"";if(!cu||cu.indexOf("/api/")===0||(s.type&&s.type!=="local")){skip++;continue}setP(true,Math.round((i+1)/total*100));try{var r=await af("./tags/"+id,{method:"PUT",body:JSON.stringify({cover_url:cu})});var d=await r.json();if(d.error){log("封面下载失败 #"+id+": "+d.error,"e");fail++}else{ok++;log("封面已下载 #"+id+" "+esc(s.artist)+" - "+esc(s.title))}}catch(e2){log("封面下载异常 #"+id+": "+e2.message,"e");fail++}await sleep(300)}await loadSongs();toast("封面: ok"+ok+" skip"+skip+" fail"+fail)}catch(e){log("dlCover err:"+e.message,"e")}S.busy=false;setP(false,100)}
async function clearCover(){if(S.busy)return;var is=ids();if(!is.length){toast("请先选择歌曲");return}if(!confirm("确定要清除选中歌曲的嵌入式封面吗？\n清除后可重新刮削或下载封面。"))return;S.busy=true;setP(true,0);var ok=0,skip=0,fail=0,total=is.length;try{for(var i=0;i<is.length;i++){var id=is[i],s=findSong(id);if(!s||(s.type&&s.type!=="local")){skip++;continue}setP(true,Math.round((i+1)/total*100));try{var r=await af("./cover/clear/"+id,{method:"POST"});var d=await r.json();if(d.error){log("封面清除失败 #"+id+": "+d.error,"e");fail++}else{ok++;log("封面已清除 #"+id+" "+esc(s.artist)+" - "+esc(s.title))}}catch(e2){log("封面清除异常 #"+id+": "+e2.message,"e");fail++}await sleep(300)}await loadSongs();toast("清除封面: ok"+ok+" skip"+skip+" fail"+fail)}catch(e){log("clearCover err:"+e.message,"e")}S.busy=false;setP(false,100)}

/* ========== failed + edit tabs ========== */
function renderFailedTab(){
  E("desktopRoot").innerHTML=E("mobileRoot").innerHTML='';
  var html='<div style="padding:16px;overflow-y:auto;flex:1"><div style="max-width:900px;margin:0 auto"><h3 style="font-size:13px;color:var(--md-on-surface-variant);margin-bottom:12px"><span class="material-symbols-outlined mi">warning</span> 失败/跳过列表</h3><div class="desk-tbar" style="margin-bottom:8px"><button onclick="loadFailed()"><span class="material-symbols-outlined mi">refresh</span> 刷新</button><button onclick="clearFailed()"><span class="material-symbols-outlined mi">delete</span> 清空</button></div><div id="failedList"></div></div></div>';
  E("desktopRoot").innerHTML=html;
  renderFailed();
}
function renderEditTab(){
  E("desktopRoot").innerHTML=E("mobileRoot").innerHTML='';
  var html='<div style="padding:16px;overflow-y:auto;flex:1"><div style="max-width:700px;margin:0 auto"><h3 style="font-size:13px;color:var(--md-on-surface-variant);margin-bottom:12px">标签编辑</h3><div style="display:flex;gap:6px;margin-bottom:8px"><input id="eq" placeholder="搜索..." onkeydown="if(event.key===\'Enter\')loadEditView()" style="flex:1;min-width:120px;padding:6px 10px;border-radius:8px;border:1px solid var(--md-outline);background:var(--md-surface-2);color:var(--md-on-surface);outline:none"><button class="btn btn-s" onclick="loadEditView()"><span class="material-symbols-outlined mi">search</span></button></div><div class="slist" id="editSongList" style="max-height:200px"><div style="text-align:center;padding:20px;color:var(--md-on-surface-variant)">搜索歌曲</div></div><div id="editPanel" style="display:none;margin-top:8px;padding:12px;border:1px solid var(--md-outline);border-radius:12px"><div style="display:flex;gap:8px;margin-bottom:8px"><div id="editCover" style="width:80px;height:80px;border-radius:10px;background:var(--md-surface-2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0"><span class="material-symbols-outlined mi">music_note</span></div><div style="flex:1"><div class="fld"><label>标题</label><input id="ef_tit"></div><div class="fld"><label>艺术家</label><input id="ef_art"></div><div class="fld"><label>专辑</label><input id="ef_alb"></div><div class="fld"><label>流派</label><input id="ef_gen"></div><div class="fld"><label>歌词</label><textarea id="ef_lyr"></textarea></div><button class="btn btn-s" onclick="saveEditPanel()">保存</button><button class="btn btn-sm" onclick="scrapeEdit()" style="margin-left:4px;border:1px solid var(--md-outline);background:var(--md-surface-2);color:var(--md-on-surface)">刮削这首歌</button></div></div></div></div></div>';
  E("desktopRoot").innerHTML=html;
}
function renderFailed(){
  var c=E("failedList")||document.getElementById("failedList");if(!c)return;
  if(!S.failedSongs.length){c.innerHTML='<div style="text-align:center;padding:20px;color:var(--md-on-surface-variant)">无失败记录</div>';return}
  c.innerHTML=S.failedSongs.map(function(f,i){var s=findSong(f.id),art=s?s.artist||"":"?",tit=s?s.title||"":"?";return'<div style="display:flex;align-items:center;padding:8px 0;gap:8px;border-bottom:1px solid var(--md-surface-variant)"><div style="flex:1;min-width:0"><div style="font-weight:500;font-size:14px">'+esc(tit)+'</div><div style="font-size:12px;color:var(--md-on-surface-variant)">'+esc(art)+' · '+esc(f.reason||"")+'</div></div><input id=fk_'+i+' placeholder=关键词 value="'+escH(art)+' '+escH(tit)+'" style="flex:1;min-width:60px;padding:4px 8px;border-radius:8px;border:1px solid var(--md-outline);font-size:12px;background:var(--md-surface-2);color:var(--md-on-surface)"><button class="btn btn-s" onclick="retryFailed('+i+','+f.id+')"><span class="material-symbols-outlined mi">search</span></button></div>'}).join("")}

function retryFailed(i,id){var kw=E("fk_"+i).value.trim();if(!kw){var s=findSong(id);kw=(s?(s.artist||"")+" "+(s.title||""):"").trim()}if(!kw){toast("need keyword");return}var s=findSong(id);S.retryId=id;E("ra").value=s?s.artist||"":"";E("rt").value=s?s.title||"":"";E("rk").value=kw;E("retryRes").innerHTML="";E("retryModal").style.display="flex"}
function showRetry(){var is=ids();if(is.length!==1){toast("select one");return}S.retryId=is[0];E("ra").value="";E("rt").value="";E("rk").value="";E("retryRes").innerHTML="";E("retryModal").style.display="flex"}
function closeRetry(){E("retryModal").style.display="none";S.retryId=0}
async function doRetry(){var id=S.retryId;if(!id)return;var art=E("ra").value.trim(),tit=E("rt").value.trim(),kw=E("rk").value.trim()||(art+" "+tit);if(!kw){toast("need keyword");return}try{var r=await af("./scrape/manual/"+id,{method:"POST",body:JSON.stringify({keyword:kw,artist:art,title:tit})});var d=await r.json();if(d.error){E("retryRes").innerHTML="<div class=log e>"+esc(d.error)+"</div>";return}var sc=d.sourceScores?Object.entries(d.sourceScores).map(function(e){return e[0]+":"+e[1].toFixed(2)}).join(", "):"";E("retryRes").innerHTML='<div style=padding:8px><b>'+esc(d.artist)+' - '+esc(d.title)+'</b><br>album: '+esc(d.album||"")+'<br>src: '+d.source+' ('+d.score.toFixed(2)+')<br>'+sc+'<br><button class="btn btn-p" data-art="'+escH(d.artist)+'" data-tit="'+escH(d.title)+'" data-alb="'+escH(d.album||"")+'" data-sid="'+id+'" onclick="applyR(this)" style=margin-top:4px>write</button></div>'}catch(e){E("retryRes").innerHTML="<div class=log e>"+esc(e.message)+"</div>"}}
function escH(s){var d={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};return(s||"").replace(/[&<>"']/g,function(c){return d[c]||c})}
async function applyR(el){var id=parseInt(el.dataset.sid),art=el.dataset.art,tit=el.dataset.tit,alb=el.dataset.alb;closeRetry();S.busy=true;setP(true,0);try{var r=await af("./tags/"+id,{method:"PUT",body:JSON.stringify({title:tit,artist:art,album:alb})});var d=await r.json();if(d.error){log("写入失败:"+d.error,"e");toast("失败")}else{log("ok "+art+" - "+tit+" | "+d.file_write);toast("写入成功");S.failedSongs=S.failedSongs.filter(function(f){return f.id!==id});try{await af("./storage/failed",{method:"POST",body:JSON.stringify(S.failedSongs)})}catch(e){log("save failed err:"+e.message)}renderFailed();await loadSongs()}}catch(e){log("err:"+e.message,"e")}S.busy=false;setP(false,100)}

function resumeBatch(){
  var taskId=localStorage.getItem("batchTaskId");if(!taskId)return;
  var t=parseInt(localStorage.getItem("batchTotal"))||0;S.busy=true;E("btnStop").disabled=false;setP(true,0);var pe=E("ptxt");if(pe)pe.textContent="0/"+t;log("resuming batch...");S._loggedCnt=-1;
  S._pollId=setInterval(async function(){try{var pr=await af("./scrape/batch/progress?taskId="+taskId);if(!pr.ok){stopBatch();log("batch task expired");return}var pd=await pr.json();if(pd.error){stopBatch();return}setP(true,Math.round(pd.current/pd.total*100));var pe=E("ptxt");if(pe)pe.textContent=pd.current+"/"+pd.total;if(pd.lastLog&&pd.loggedCount!=S._loggedCnt){var ll=pd.lastLog.replace('| skipped','| ok (no change)');log(ll);S._loggedCnt=pd.loggedCount}if(pd.status==="done"){clearInterval(S._pollId);S._pollId=0;localStorage.removeItem("batchTaskId");localStorage.removeItem("batchTotal");setP(true,100);var pe2=E("ptxt");if(pe2)pe2.textContent="";E("btnStop").disabled=true;(pd.failedIds||[]).forEach(function(id){addFailed(id,"failed")});var doneLogs=0;(pd.results||[]).forEach(function(r){if(S._loggedCnt===undefined||doneLogs>=S._loggedCnt)log(r.artist+" - "+r.title+" | "+r.source+" | "+(r.fileWriteStatus==='skipped'?'ok (no change)':r.fileWriteStatus));doneLogs++});log("done: ok"+pd.success+" fail"+pd.failed+" skip"+pd.skipped);toast("ok"+pd.success+" fail"+pd.failed);await loadSongs();S.busy=false}}catch(e2){stopBatch()}},2000);
}

async function showDoc(type){var u="https://raw.githubusercontent.com/songloft-org/songloft-plugin-tag/main/"+(type==="README"?"README.md":"CHANGELOG.md");E("docTitle").textContent=type;E("docBody").innerHTML="<div style='color:var(--md-on-surface-variant)'>加载中...</div>";E("docModal").style.display="flex";try{var r=await fetch(u);if(!r.ok){E("docBody").innerHTML="<div style='color:var(--md-error)'>加载失败 (HTTP "+r.status+")</div>";return}var raw=await r.text();E("docBody").innerHTML=md2html(raw)}catch(e){E("docBody").innerHTML="<div style='color:var(--md-error)'>"+esc(e.message)+"</div>"}}
function closeDoc(){E("docModal").style.display="none"}
function md2html(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/^### (.+)/gm,"<h4 style='margin:12px 0 4px'>$1</h4>").replace(/^## (.+)/gm,"<h3 style='margin:16px 0 6px;color:var(--md-primary)'>$1</h3>").replace(/^# (.+)/gm,"<h2 style='margin:20px 0 8px;color:var(--md-primary)'>$1</h2>").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"<code style='background:var(--md-surface-variant);padding:1px 4px;border-radius:3px'>$1</code>").replace(/^- (.+)/gm,"<li style='margin-left:16px'>$1</li>").replace(/\|(.+)\|/g,function(m){var cells=m.split("|").filter(function(c){return c.trim()});if(cells.every(function(c){return /^[-: ]+$/.test(c.trim())}))return"";return"<div style='display:flex;gap:0'>"+cells.map(function(c){return"<div style='flex:1;padding:2px 6px;border:1px solid var(--md-surface-variant)'>"+c.trim()+"</div>"}).join("")+"</div>"}).replace(/\[([^\]]+)\]\(([^)]+)\)/g,"<a href='$2' target='_blank' style='color:var(--md-primary)'>$1</a>").replace(/\n\n/g,"<br><br>")}

/* ========== setup & mobile header tweaks ========== */
function setupMobile(){
  var br=E("btnReadme");if(br)br.style.display=isMobile()?"none":"";
  var bc=E("btnClog");if(bc)bc.style.display=isMobile()?"none":"";
  if(isMobile()){
    if(!E("btnMore")){
      var mb=document.createElement("button");mb.className="btn btn-sm";mb.id="btnMore";
      mb.style.cssText="display:inline-flex;margin-left:auto;width:auto;min-width:unset";
      mb.innerHTML='<span class="material-symbols-outlined mi">more_vert</span>';
      var hdr=document.querySelector(".hdr");if(hdr)hdr.appendChild(mb);
      var mm=document.createElement("div");mm.id="moreMenu";mm.style.cssText="display:none;position:fixed;right:8px;top:40px;background:var(--md-surface);border-radius:10px;box-shadow:var(--md-shadow-3);z-index:200;min-width:120px;overflow:hidden";
      mm.innerHTML='<button style="display:block;width:100%;padding:8px 12px;border:none;background:none;color:var(--md-on-surface);font-size:11px;text-align:left;cursor:pointer" onclick="showDoc(\'README\');E(\'moreMenu\').style.display=\'none\'"><span class="material-symbols-outlined mi" style="font-size:14px">description</span> README</button><button style="display:block;width:100%;padding:8px 12px;border:none;background:none;color:var(--md-on-surface);font-size:11px;text-align:left;cursor:pointer" onclick="showDoc(\'CHANGELOG\');E(\'moreMenu\').style.display=\'none\'"><span class="material-symbols-outlined mi" style="font-size:14px">history</span> 改动日志</button>';
      document.body.appendChild(mm);
      mb.onclick=function(){var m=E("moreMenu");if(m)m.style.display=m.style.display==="none"?"block":"none"};
    }
  } else {
    var arr=["btnMore","moreMenu"];arr.forEach(function(id){var e=E(id);if(e)e.remove()});
  }
}

window.onload=function(){
  init();
  window.addEventListener("resize",function(){
    var wasMobile=!isMobile();
    setupMobile();
    if(typeof lastMobile==='undefined')lastMobile=isMobile();
    if(lastMobile!==isMobile()){
      lastMobile=isMobile();
      buildLayout();
    }
  });
};
var lastMobile;
function buildLayout(){
  if(isMobile()){E("desktopRoot").innerHTML="";buildMobile()}else{E("mobileRoot").innerHTML="";buildDesktop()}
  render();loadCfg().then(function(){chkSources()});
}
async function init(){
  E("desktopRoot").style.display=isMobile()?"none":"";
  E("mobileRoot").style.display=isMobile()?"":"none";
  buildLayout();
  setupMobile();
  await loadCfg();chkSources();await loadSongs();await loadFailed();resumeBatch();
}
</script>
