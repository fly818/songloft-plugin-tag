<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>标签刮削</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..24,400,0,0&display=swap">
<style>
/* ===========================================================================================
   LAYER 0: RESET & DESIGN TOKENS
   =========================================================================================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* override with --md-* from common.css if present; fallback dark palette */
  --bg:   var(--md-surface-1, #0C0C1D);
  --bg2:  var(--md-surface-2, #14142B);
  --bg3:  var(--md-surface,    #1A1A38);
  --fg:   var(--md-on-surface, #E8EAF0);
  --fg2:  var(--md-on-surface-variant, #9E9EB8);
  --pri:  var(--md-primary, #6C7CFF);
  --pric: var(--md-primary-container, #1E2040);
  --onp:  var(--md-on-primary, #FFFFFF);
  --err:  var(--md-error, #FF5757);
  --ok:   var(--md-success, #44D78B);
  --brd:  var(--md-outline, #2A2A4A);
  --sh:   var(--md-shadow-1, 0 1px 3px rgba(0,0,0,.4));
}
body{background:var(--bg);color:var(--fg);font-size:13px;line-height:1.45;overflow:hidden;font-family:system-ui,-apple-system,sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* ===========================================================================================
   LAYER 1: SHARED PRIMITIVES
   =========================================================================================== */
.mi{font-size:18px;vertical-align:middle;font-family:'Material Symbols Outlined';font-weight:400;font-style:normal;line-height:1;text-transform:none;letter-spacing:normal;word-wrap:normal;white-space:nowrap;direction:ltr}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;font-weight:500;cursor:pointer;transition:all .12s ease;white-space:nowrap;user-select:none}
.btn:active:not(:disabled){transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:default}
/* primary */
.btn-p{background:var(--pri);color:var(--onp);border-radius:16px;padding:7px 16px;font-size:13px;box-shadow:0 0 0 0 var(--pri);transition:box-shadow .25s}
.btn-p:hover:not(:disabled){box-shadow:0 0 0 2px var(--pri)}
/* secondary */
.btn-s{background:var(--pric);color:var(--pri);border-radius:12px;padding:5px 12px;font-size:12px}
.btn-s:hover:not(:disabled){background:color-mix(in srgb,var(--pric) 80%,var(--pri))}
/* toolbar */
.btn-t{padding:4px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--bg2);font-size:11px;color:var(--fg);gap:4px}
.btn-t:hover:not(:disabled){border-color:var(--fg2);background:var(--bg3)}
.btn-t:active:not(:disabled){background:var(--pric)}
.btn-t .mi{font-size:16px}
/* stop */
.btn-danger{background:var(--err);color:var(--onp);border-radius:6px;padding:4px 10px;font-size:11px}
.btn-danger:disabled{opacity:.25}
/* ghost */
.btn-gh{padding:5px 10px;font-size:11px;color:var(--fg2);background:transparent;border:1px solid transparent;border-radius:6px}
.btn-gh:hover{color:var(--fg);background:var(--bg2);border-color:var(--brd)}

/* tabs */
.tabs{display:flex;gap:1px;background:color-mix(in srgb,var(--pri) 12%,transparent);border-radius:9px;padding:2px}
.tabs button{padding:5px 13px;border:none;background:none;color:color-mix(in srgb,var(--fg) 55%,transparent);font-size:12px;border-radius:7px;cursor:pointer;font-weight:500;transition:all .15s}
.tabs button.on{background:color-mix(in srgb,var(--pri) 22%,transparent);color:var(--fg)}
.tabs button:hover:not(.on){color:var(--fg)}

/* search */
.srch{display:flex;gap:5px}
.srch input{flex:1;padding:7px 10px;border-radius:7px;border:1px solid var(--brd);font-size:12px;outline:none;background:var(--bg2);color:var(--fg);transition:border-color .15s}
.srch input:focus{border-color:var(--pri)}
.srch input::placeholder{color:var(--fg2);opacity:.5}

/* tree items */
.tr-n{padding:2px 8px;cursor:pointer;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg2);font-size:11px;transition:all .08s;line-height:2.1}
.tr-n:hover{color:var(--fg);background:var(--bg3)}
.tr-n.sel{color:var(--pri);background:var(--pric);font-weight:600}
.tr-n .mi{font-size:14px}

/* song row */
.srow{display:flex;align-items:center;padding:8px 10px;gap:8px;border-radius:7px;cursor:pointer;color:var(--fg);transition:background .08s}
.srow:hover{background:var(--bg3)}
.srow.sel{background:var(--pric)}
.srow input[type=checkbox]{accent-color:var(--pri);flex-shrink:0;width:16px;height:16px;cursor:pointer}
.sinfo{flex:1;min-width:0}
.sinfo .t{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sinfo .u{font-size:11px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}

/* chip */
.chip{padding:4px 10px;border-radius:5px;border:1px solid var(--brd);font-size:11px;cursor:pointer;text-align:center;transition:all .12s;background:var(--bg2);color:var(--fg2)}
.chip:hover{border-color:var(--fg2);color:var(--fg)}
.chip.on{border-color:var(--ok);color:var(--ok);background:color-mix(in srgb,var(--ok) 8%,transparent)}

/* config inputs */
.cfg{margin-top:6px}
.cfg label{font-size:10px;color:var(--fg2);display:block;margin-bottom:2px}
.cfg input{width:100%;padding:5px 8px;border-radius:5px;border:1px solid var(--brd);font-size:11px;background:var(--bg2);color:var(--fg);outline:none;transition:border-color .15s}
.cfg input:focus{border-color:var(--pri)}

/* log */
.log{overflow-y:auto;background:var(--bg2);border-radius:6px;padding:5px 8px;font-size:10px;font-family:'Fira Code','Cascadia Code','JetBrains Mono',monospace;color:var(--fg2);line-height:1.6;max-height:80px}
.log .e{color:var(--err)}
.log .ok{color:var(--ok)}

/* progress bar */
.pbar{height:2px;background:var(--brd);overflow:hidden}
.pfill{height:100%;background:var(--pri);transition:width .3s;width:0%}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.mbody{background:var(--bg3);border-radius:14px;padding:18px;width:92%;max-width:460px;max-height:85vh;overflow-y:auto;color:var(--fg);border:1px solid var(--brd);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.mbody h3{font-size:14px;margin-bottom:10px;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--pric);color:var(--pri);padding:7px 18px;border-radius:16px;font-size:12px;z-index:999;display:none;box-shadow:0 2px 12px rgba(0,0,0,.4);transition:opacity .25s}
.fld{margin-bottom:8px}.fld label{font-size:11px;color:var(--fg2);display:block;margin-bottom:2px}.fld input,.fld textarea{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--brd);font-size:13px;background:var(--bg2);color:var(--fg);outline:none;resize:vertical}
.fld textarea{min-height:55px}

/* ===========================================================================================
   LAYER 2: LAYOUT — HEADER
   =========================================================================================== */
#app{display:flex;flex-direction:column;height:100vh}
.hdr{background:var(--pri);color:var(--onp);padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.hdr .logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hdr .logo .mi{font-size:20px}
.hdr .ver{font-size:10px;opacity:.5;font-weight:400;margin-left:3px}
.hdr .tabs{margin-left:10px}
.hdr .btn{background:color-mix(in srgb,var(--onp) 12%,transparent);color:var(--onp);font-size:11px;padding:5px 10px;border-radius:7px}
.hdr .btn:hover{background:color-mix(in srgb,var(--onp) 20%,transparent)}
.hdr .spacer{flex:1}

/* ===========================================================================================
   LAYER 3: DESKTOP (>=601px)
   =========================================================================================== */
@media(min-width:601px){
  #dRoot{display:flex!important;flex:1;overflow:hidden;min-height:0}
  #mRoot{display:none!important}
  #mTabs{display:none!important}

  /* columns */
  .d-tree{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
  .d-tree .thd{padding:8px 10px;font-size:10px;color:var(--fg2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;justify-content:space-between}
  .d-tree .tlist{flex:1;overflow-y:auto;padding:6px 4px}
  .d-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .d-top{flex-shrink:0;padding:8px 12px 0}
  .d-list{flex:1;overflow-y:auto;padding:4px 12px 0}
  .d-bar{border-top:1px solid var(--brd);padding:4px 12px;font-size:11px;color:var(--fg2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .d-side{width:260px;flex-shrink:0;border-left:1px solid var(--brd);background:var(--bg2);overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px}
  .d-side h4{font-size:10px;color:var(--fg2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
  .d-side .side-sec{padding-bottom:8px;border-bottom:1px solid var(--brd)}
  .d-side .side-sec:last-child{border-bottom:none}

  /* toolbar */
  .tbar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
  .tbar .sep{width:1px;height:18px;background:var(--brd);display:inline-block;margin:0 3px;flex-shrink:0}

  /* empty state */
  .empty{text-align:center;padding:48px 20px;color:var(--fg2);font-size:12px}
  .empty .mi{font-size:32px;display:block;margin-bottom:8px;opacity:.3}
}

/* ===========================================================================================
   LAYER 4: MOBILE (<=600px)
   =========================================================================================== */
@media(max-width:600px){
  body{overflow-x:hidden;overflow-y:auto}
  #dRoot{display:none!important}
  #mRoot{display:flex!important;flex-direction:column;flex:1}
  #dTabs{display:none!important}
  #mTabs{display:flex!important;justify-content:center;padding:5px 8px;gap:4px;background:var(--bg)}
  #mTabs button{padding:4px 12px;border:none;background:var(--bg2);color:var(--fg2);font-size:11px;border-radius:6px;cursor:pointer;font-weight:500}
  #mTabs button.on{background:var(--pri);color:var(--onp)}

  .hdr{padding:4px 8px;gap:4px}
  .hdr .logo{font-size:12px}
  .hdr .logo .mi{font-size:16px}
  .hdr .ver{display:none}
  .hdr .btn{font-size:10px!important;padding:3px 7px!important;border-radius:6px!important}
  .hdr .btn .mi{font-size:14px!important}

  .m-top{padding:6px 8px 0;flex-shrink:0}
  .m-tbar{display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-bottom:5px}
  .m-tbar button{padding:3px 7px;border-radius:6px;border:1px solid var(--brd);background:var(--bg2);font-size:10px;color:var(--fg);cursor:pointer;gap:3px}
  .m-tbar .mi{font-size:14px!important}
  .m-tbar .m-xtra{display:none}
  .m-tbar.open .m-xtra{display:contents}
  .m-tbar .sep{width:1px;height:14px;background:var(--brd);display:inline-block;margin:0 1px}
  .m-tgl{padding:3px 7px!important;font-size:10px!important;border:1px solid var(--brd)!important;background:var(--bg2)!important;color:var(--pri)!important;cursor:pointer}
  .m-slist{flex:1;overflow-y:auto;padding:4px 8px 0}
  .m-bar{padding:4px 8px;font-size:10px;color:var(--fg2);border-top:1px solid var(--brd);display:flex;justify-content:space-between;flex-shrink:0}
  .m-sec{border-top:1px solid var(--brd);flex-shrink:0}
  .m-sec h4{padding:8px 10px;font-size:11px;color:var(--fg2);font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
  .m-sec h4 .arw{font-size:10px;transition:transform .15s}
  .m-sec h4 .arw.up{transform:rotate(180deg)}
  .m-sec .m-body{display:none;padding:0 10px 8px}
  .m-touch{min-height:44px;min-width:44px;display:flex;align-items:center}
}

/* ===========================================================================================
   LAYER 5: ANIMATIONS
   =========================================================================================== */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.srow{animation:fadeIn .2s ease both}
.srow:nth-child(1){animation-delay:0s}
.srow:nth-child(2){animation-delay:.02s}
.srow:nth-child(3){animation-delay:.04s}
.srow:nth-child(4){animation-delay:.06s}
.srow:nth-child(5){animation-delay:.08s}
.srow:nth-child(6){animation-delay:.1s}

@media(prefers-reduced-motion){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="app">
  <!-- === HEADER === -->
  <div class="hdr">
    <div class="logo"><span class="mi">music_note</span>标签刮削<span class="ver">v1.0.7</span></div>
    <div class="tabs" id="dTabs">
      <button class="on" data-tab="songs" onclick="switchTab('songs')"><span class="mi">music_note</span>歌曲</button>
      <button data-tab="failed" onclick="switchTab('failed')"><span class="mi">warning</span>失败</button>
      <button data-tab="edit" onclick="switchTab('edit')"><span class="mi">edit</span>编辑</button>
    </div>
    <div class="spacer"></div>
    <button class="btn" onclick="loadSongs()"><span class="mi">refresh</span>刷新</button>
    <button class="btn" id="hBtnReadme" onclick="showDoc('README')"><span class="mi">description</span>README</button>
    <button class="btn" id="hBtnClog" onclick="showDoc('CHANGELOG')"><span class="mi">history</span>改动日志</button>
  </div>

  <!-- === MOBILE TABS === -->
  <div id="mTabs">
    <button class="on" data-tab="songs" onclick="switchTab('songs')"><span class="mi">music_note</span>歌曲</button>
    <button data-tab="failed" onclick="switchTab('failed')"><span class="mi">warning</span>失败</button>
    <button data-tab="edit" onclick="switchTab('edit')"><span class="mi">edit</span>编辑</button>
  </div>

  <!-- === DESKTOP ROOT === -->
  <div id="dRoot"></div>
  <!-- === MOBILE ROOT === -->
  <div id="mRoot"></div>
</div>

<!-- === MODALS === -->
<div class="modal" id="prevModal"><div class="mbody">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px"><h3 id="prevTitle">预览</h3><button class="btn btn-gh" onclick="closePrev()">✕</button></div>
  <div class="fld"><label>艺术家</label><input id="ea"></div><div class="fld"><label>标题</label><input id="et"></div><div class="fld"><label>专辑</label><input id="eb"></div>
  <div id="prevMeta" style="font-size:11px;color:var(--fg2);margin-bottom:8px"></div>
  <div id="prevCover" style="margin-bottom:8px"></div>
  <div style="display:flex;gap:6px"><button class="btn btn-p" onclick="applyPrev()">写入</button><button class="btn btn-gh" onclick="closePrev()">取消</button></div>
</div></div>
<div class="modal" id="retryModal"><div class="mbody">
  <h3><span class="mi">refresh</span> 手动刮削</h3>
  <div class="fld"><label>艺术家（选填）</label><input id="ra"></div><div class="fld"><label>标题（选填）</label><input id="rt"></div><div class="fld"><label>搜索关键词</label><input id="rk"></div>
  <div style="display:flex;gap:6px"><button class="btn btn-p" onclick="doRetry()"><span class="mi">search</span>搜索</button><button class="btn btn-s" onclick="closeRetry()">取消</button></div>
  <div id="retryRes" style="margin-top:8px;max-height:180px;overflow-y:auto"></div>
</div></div>
<div class="modal" id="docModal"><div class="mbody" style="max-width:650px">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px"><h3 id="docTitle">文档</h3><button class="btn btn-gh" onclick="closeDoc()">✕</button></div>
  <div style="font-size:12px;line-height:1.8;max-height:65vh;overflow-y:auto" id="docBody"></div>
</div></div>

<script>
/* ===========================================================================================
   STATE & UTILITIES
   =========================================================================================== */
var S={songs:[],sel:new Set,cfg:{},srcStatus:{},prev:null,busy:false,retryId:0,failedSongs:[],_allSongs:[]},S_editId=0;
var E=id=>document.getElementById(id);
var isMb=()=>window.innerWidth<=600;
function token(){try{if(window.SongloftPlugin)return SongloftPlugin.getAuthToken()||""}catch(e){}try{var r=localStorage.getItem("songloft-auth");if(r)return JSON.parse(r).accessToken||""}catch(e){}return new URLSearchParams(location.search).get("access_token")||""}
async function af(u,o){o=o||{};o.headers=o.headers||{};var t=token();if(t)o.headers["Authorization"]="Bearer "+t;if(!o.headers["Content-Type"]&&o.method)o.headers["Content-Type"]="application/json";return fetch(u,o)}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function escH(s){var m={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};return(s||"").replace(/[&<>"']/g,c=>m[c]||c)}
function fm(s){if(!s||s<=0)return"--:--";var m=Math.floor(s/60);return m+":"+String(Math.floor(s%60)).padStart(2,"0")}
function toast(m){var e=E("toast");if(!e){e=document.createElement("div");e.className="toast";e.id="toast";document.body.appendChild(e)}e.textContent=m;e.style.display="block";e.style.opacity=1;setTimeout(function(){e.style.opacity=0;setTimeout(function(){e.style.display="none"},250)},1800)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function findSong(id){var a=S._allSongs||S.songs;for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null}
function setP(s,p){var bar=E("d-pbar")||E("m-pbar"),fill=E("d-pfill")||E("m-pfill");if(bar)bar.style.display=s?"":"none";if(fill)fill.style.width=p+"%"}
function log(m,l){var c=E("d-log")||E("m-log");if(!c)return;var d=document.createElement("div");d.className=l==="e"?"e":l==="ok"?"ok":"";d.textContent=new Date().toLocaleTimeString()+" "+(m||"");c.appendChild(d);c.scrollTop=c.scrollHeight;while(c.children.length>200)c.firstChild.remove()}

/* ===========================================================================================
   PLATFORM-RESOLVED ELEMENT MAPPER
   =========================================================================================== */
var _elemMap={};
function setElemMap(map){_elemMap=map}
function $$(key){var id=_elemMap[key]||key;return document.getElementById(id)||document.getElementById(key)}

/* ===========================================================================================
   BUILD DESKTOP
   =========================================================================================== */
function buildDesktop(){
  var r=E("dRoot");if(!r)return;
  r.innerHTML='\
  <div class="d-tree">\
    <div class="thd"><span>目录</span><span id="d-treeCount">0</span></div>\
    <div class="tlist" id="d-treeList"></div>\
  </div>\
  <div class="d-main">\
    <div class="d-top">\
      <div class="srch"><input id="d-q" placeholder="搜索歌曲（回车）..." onkeydown="if(event.key===\'Enter\')search()"><button class="btn btn-s" onclick="search()"><span class="mi">search</span></button></div>\
      <div id="d-crumb" style="font-size:11px;color:var(--fg2);padding:3px 0;min-height:18px"></div>\
      <div class="tbar" id="d-tbar">\
        <button class="btn-t" onclick="showAll()" id="d-btnAll"><span class="mi">list</span>全部</button>\
        <button class="btn-t" onclick="selAll()"><span class="mi">check_box</span>全选</button>\
        <button class="btn-t" onclick="selNone()"><span class="mi">check_box_outline_blank</span>清空</button>\
        <span class=sep></span>\
        <button class="btn-t" onclick="doScrape()" id="d-btnScrape" disabled><span class="mi">edit_note</span>刮削</button>\
        <button class="btn-t" onclick="batchForce()" id="d-btnForce" disabled><span class="mi">refresh</span>强制</button>\
        <button class="btn-t" id="d-btnPrev" onclick="preview()" disabled><span class="mi">search</span>预览</button>\
        <span class=sep></span>\
        <button class="btn-t" onclick="dlCover()" id="d-btnDlCover" disabled><span class="mi">download</span>下载封面</button>\
        <button class="btn-t" onclick="clearCover()" id="d-btnClearCover" disabled title="清除嵌入式封面"><span class="mi">hide_image</span>清除封面</button>\
        <button class="btn-danger" onclick="stopBatch()" id="d-btnStop" disabled><span class="mi">stop</span>停止</button>\
        <button class="btn-t" onclick="clearScraped()"><span class="mi">delete</span>清空记录</button>\
      </div>\
    </div>\
    <div class="d-list" id="d-list"><div class="empty"><span class="mi">library_music</span>加载中...</div></div>\
    <div class="d-bar"><span id="d-selInfo"></span><span id="d-ptxt" style="color:var(--pri)"></span></div>\
    <div class="pbar" id="d-pbar" style="display:none"><div class="pfill" id="d-pfill"></div></div>\
    <div style="flex-shrink:0;border-top:1px solid var(--brd);padding:6px 12px;display:flex;gap:10px;align-items:flex-start;overflow:hidden">\
      <div style="flex:1;min-width:0">\
        <h4 style="font-size:10px;color:var(--fg2);margin-bottom:3px;cursor:pointer;user-select:none" onclick="var l=$$(\'d-log\');l.style.display=l.style.display===\'none\'?\'block\':\'none\'">▼ 日志</h4>\
        <div class="log" id="d-log"><div>就绪</div></div>\
      </div>\
    </div>\

async function loadSongs(){try{var r=await af("./songs"),d=await r.json();S._allSongs=d.songs||d||[];if(!S._musicPrefix&&S._allSongs.length){var fp=(S._allSongs[0].file_path||"").replace(/^\//,""),si=fp.indexOf("/");S._musicPrefix=si>0?fp.substring(0,si)+"/":"";S._rootName=S._musicPrefix?S._musicPrefix.replace(/\/$/,""):"全部"}render()}catch(e){log("加载失败:"+e.message,"e")}}
function search(){var kw=$$("q").value.trim().toLowerCase();S._curPath="";S.songs=kw?S._allSongs.filter(s=>(s.title||"").toLowerCase().indexOf(kw)>=0||(s.artist||"").toLowerCase().indexOf(kw)>=0||(s.album||"").toLowerCase().indexOf(kw)>=0):S._allSongs.slice();render()}

function showAll(){S._curPath="";S.songs=S._allSongs.slice();render()}
function filterPath(){var arr=S._allSongs||[],p=S._curPath||"";if(!p)S.songs=arr.slice();else{var prefix=S._musicPrefix+(p?p+"/":"");S.songs=arr.filter(s=>{var fp=(s.file_path||"").replace(/^\//,"");return fp.startsWith(prefix)&&fp.indexOf("/",prefix.length)<0})}render()}
function navTo(path){S._curPath=path||"";filterPath()}
function buildTree(path,depth){
  var prefix=S._musicPrefix+(path?path+"/":""),sub={};
  S._allSongs.forEach(s=>{var fp=(s.file_path||"").replace(/^\//,"");if(!fp.startsWith(prefix))return;var rel=fp.substring(prefix.length);if(rel[0]==="/")rel=rel.substring(1);var i=rel.indexOf("/");if(i>0)sub[rel.substring(0,i)]=true});
  var keys=Object.keys(sub).sort(),h="",sel=S._curPath||"";
  for(var i=0;i<keys.length;i++){var nm=keys[i],pn=path?path+"/"+nm:nm;h+='<div'+(pn===sel?' class="tr-n sel"':' class="tr-n"')+' style="padding-left:'+(depth*12+4)+'px" data-p="'+escH(pn)+'">'+esc(nm)+'</div>'+buildTree(pn,depth+1)}
  return h;
}
function render(){
  var t=$$("treeList"),c=$$("crumb"),tc=$$("treeCount");

    var h=buildTree("",0);t.innerHTML=h||'<div style="padding:8px;color:var(--fg2);font-size:11px">空</div>';
    t.querySelectorAll("[data-p]").forEach(el=>{el.onclick=function(){navTo(this.getAttribute("data-p"))}});

  }

    if(S._curPath){var p=S._curPath.split("/"),ch='<span style="color:var(--pri);cursor:pointer" onclick="navTo(\'\')">'+(S._rootName||"全部")+'</span>',sf="";for(var i=0;i<p.length;i++){sf+=p[i];if(i)sf="/"+sf;ch+=' › <span style="'+(i===p.length-1?'color:var(--fg)':'color:var(--pri);cursor:pointer')+'" onclick="navTo(\''+escH(sf)+'\')">'+esc(p[i])+'</span>'}c.innerHTML=ch} else c.innerHTML=S._rootName||""
  }
  var lst=$$("list");if(!lst)return;
  if(!S.songs.length){lst.innerHTML='<div class="empty"><span class="mi">library_music</span>没有歌曲</div>';return}
  lst.innerHTML=S.songs.map(s=>{var sl=S.sel.has(s.id)?" sel":"",ck=S.sel.has(s.id)?" checked":"";return'<div class="srow'+sl+'" onclick="tgl('+s.id+',event)"><input type="checkbox"'+ck+' onclick="event.stopPropagation();tgl('+s.id+')"><div class="sinfo"><div class="t">'+esc(s.title||"?")+'</div><div class="u">'+esc(s.artist||"?")+(s.album?" · "+esc(s.album):"")+" · "+fm(s.duration)+(s.format?" · "+esc(s.format):"")+"</div></div></div>"}).join("");upd()
}
function tgl(id,ev){if(ev)ev.stopPropagation();S.sel.has(id)?S.sel.delete(id):S.sel.add(id);render()}
function selAll(){S.songs.forEach(s=>S.sel.add(s.id));render()}

function upd(){
  var mp=S._musicPrefix||"",inf=$$("selInfo"),cur=S._curPath||"",prefix=mp+(cur?cur+"/":"");
  var count=S._allSongs?S._allSongs.filter(s=>((s.file_path||"").replace(/^\//,"")).startsWith(prefix)).length:0;
  if(inf)inf.textContent=(cur||mp.replace(/\/$/,"")||"music")+" ("+count+") — 已选 "+S.sel.size;

}

function _sc(songId){return af("./scrape/"+songId,{method:"POST"}).then(r=>r.json()).then(d=>{if(d.error){log("失败:"+d.error,"e");addFailed(songId,d.error);return null}log("ok "+d.artist+" - "+d.title+" | "+d.source+" | "+d.fileWriteStatus,"ok");if(d.fileWriteStatus==="failed")addFailed(songId,d.fileWriteStatus);return d}).catch(e=>{log("错误:"+e.message,"e");return null})}

async function preview(){var is=ids();if(is.length!==1)return;try{var r=await af("./scrape/preview/"+is[0],{method:"POST"}),d=await r.json();if(d.error){log("预览失败:"+d.error,"e");return}S.prev=d;showPrev(d)}catch(e){log("预览异常:"+e.message,"e")}}
function showPrev(d){E("prevTitle").textContent=d.artist+" - "+d.title;E("ea").value=d.artist||"";E("et").value=d.title||"";E("eb").value=d.album||"";var sc=d.sourceScores?Object.entries(d.sourceScores).map(e=>e[0]+":"+e[1].toFixed(2)).join(", "):"";E("prevMeta").innerHTML="源: "+d.source+" ("+(d.score||0).toFixed(2)+")"+(sc?"<br>"+sc:"");E("prevCover").innerHTML=d.cover_url?'<img src="'+escH(d.cover_url)+'" style="max-width:100%;border-radius:8px">':"";E("prevModal").style.display="flex"}
function closePrev(){E("prevModal").style.display="none";S.prev=null}
async function applyPrev(){var d=S.prev;if(!d)return;var art=E("ea").value.trim(),tit=E("et").value.trim(),alb=E("eb").value.trim();if(!art||!tit){toast("请填写完整");return}d.artist=art;d.title=tit;d.album=alb;closePrev();S.busy=true;setP(true,0);try{var cd="";if(d.cover_url)try{var cr=await fetch(d.cover_url);if(cr.ok){var buf=await cr.arrayBuffer(),by=new Uint8Array(buf),bi="";for(var i=0;i<by.length;i++)bi+=String.fromCharCode(by[i]);cd=btoa(bi)}}catch(e){}var r=await af("./tags/"+d.songId,{method:"PUT",body:JSON.stringify({title:tit,artist:art,album:alb,cover_data:cd})}),rd=await r.json();if(rd.error){log("写入失败:"+rd.error,"e");toast("失败")}else{log("ok "+art+" - "+tit+" | "+rd.file_write,"ok");toast("写入成功");await loadSongs()}}catch(e){log("错误:"+e.message,"e")}S.busy=false;setP(false,100)}

function stopBatch(){if(S._pollId){clearInterval(S._pollId);S._pollId=0}localStorage.removeItem("batchTaskId");localStorage.removeItem("batchTotal");S.busy=false;setP(false,100);var pe=$$("ptxt");if(pe)pe.textContent="";var bs=$$("btnStop");if(bs)bs.disabled=true;var bf=$$("btnForce");if(bf)bf.disabled=false;log("已停止")}
async function batch(force){if(S.busy)return;stopBatch();var is=ids();if(!is.length){toast("请先选择歌曲");return}S.busy=true;$$("btnStop").disabled=false;var bf=$$("btnForce");if(bf)bf.disabled=true;setP(true,0);var t=is.length,pe=$$("ptxt");if(pe)pe.textContent="0/"+t;try{var r=await af("./scrape/batch",{method:"POST",body:JSON.stringify({ids:is,force:!!force})}),d=await r.json();if(d.error){log("批量错误:"+d.error,"e");stopBatch();return}var taskId=d.taskId;log("批量开始: "+t+" 首, taskId="+taskId+(force?" (强制)":""));localStorage.setItem("batchTaskId",taskId);localStorage.setItem("batchTotal",String(t));S._loggedCnt=-1;S._pollId=setInterval(async function(){try{var pr=await af("./scrape/batch/progress?taskId="+taskId);if(!pr.ok){stopBatch();log("批量任务丢失");return}var pd=await pr.json();if(pd.error){stopBatch();return}setP(true,Math.round(pd.current/pd.total*100));var pe=$$("ptxt");if(pe)pe.textContent=pd.current+"/"+pd.total;if(pd.lastLog&&pd.loggedCount!=S._loggedCnt){log(pd.lastLog.replace("| skipped","| ok (no change)"));S._loggedCnt=pd.loggedCount}(pd.failedIds||[]).forEach(id=>addFailed(id,"failed"));if(pd.status==="done"){clearInterval(S._pollId);S._pollId=0;localStorage.removeItem("batchTaskId");localStorage.removeItem("batchTotal");setP(true,100);var pe2=$$("ptxt");if(pe2)pe2.textContent="";$$("btnStop").disabled=true;var bf=$$("btnForce");if(bf)bf.disabled=false;var dl=0;(pd.results||[]).forEach(r=>{if(S._loggedCnt===undefined||dl>=S._loggedCnt)log(r.artist+" - "+r.title+" | "+r.source+" | "+(r.fileWriteStatus==="skipped"?"ok (no change)":r.fileWriteStatus),"ok");dl++});log("完成: 成功"+pd.success+" 失败"+pd.failed+" 跳过"+pd.skipped);toast("成功"+pd.success+" 失败"+pd.failed);await loadSongs();S.busy=false}}catch(e2){stopBatch()}},2000)}catch(e){log("批量异常:"+e.message,"e");stopBatch()}}
async function batchForce(){batch(true)}
async function clearScraped(){if(S.busy)return;if(!confirm("确定要清除所有刮削记录吗？"))return;try{var r=await af("./storage/scraped",{method:"DELETE"});if(r.ok)toast("已清除")}catch(e){log("清除失败:"+e.message,"e")}}

async function addFailed(id,reason){if(S.failedSongs.some(f=>f.id===id&&f.reason===reason))return;S.failedSongs.push({id:id,reason:reason,time:new Date().toISOString()});try{await af("./storage/failed",{method:"POST",body:JSON.stringify(S.failedSongs)})}catch(e){log("保存失败记录异常:"+e.message)}renderFailed()}
function showFailed(){
  E("dRoot").innerHTML=E("mRoot").innerHTML='<div style="padding:16px;overflow-y:auto;flex:1"><div style="max-width:900px;margin:0 auto"><h3 style="font-size:13px;color:var(--fg2);margin-bottom:10px"><span class="mi">warning</span> 失败/跳过列表</h3><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px"><button class="btn-t" onclick="loadFailed()"><span class="mi">refresh</span>刷新</button><button class="btn-t" onclick="clearFailed()"><span class="mi">delete</span>清空</button></div><div id="failedList"></div></div></div>';
  renderFailed()
}
function renderFailed(){
  var c=E("failedList");if(!c)return;
  if(!S.failedSongs.length){c.innerHTML='<div class="empty"><span class="mi">check_circle</span>无失败记录</div>';return}
  c.innerHTML=S.failedSongs.map((f,i)=>{var s=findSong(f.id),art=s?s.artist||"":"?",tit=s?s.title||"":"?";return'<div style="display:flex;align-items:center;padding:8px 0;gap:8px;border-bottom:1px solid var(--brd)"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(tit)+'</div><div style="font-size:11px;color:var(--fg2)">'+esc(art)+' · '+esc(f.reason||"")+'</div></div><input id=fk_'+i+' placeholder=关键词 value="'+escH(art)+' '+escH(tit)+'" style="flex:1;min-width:60px;padding:5px 8px;border-radius:5px;border:1px solid var(--brd);font-size:11px;background:var(--bg2);color:var(--fg)"><button class="btn btn-s" onclick="retryFailed('+i+','+f.id+')"><span class="mi">search</span></button></div>'}).join("")
}
function retryFailed(i,id){var kw=E("fk_"+i).value.trim();if(!kw){var s=findSong(id);kw=(s?(s.artist||"")+" "+(s.title||""):"").trim()}if(!kw){toast("请输入关键词");return}var s=findSong(id);S.retryId=id;E("ra").value=s?s.artist||"":"";E("rt").value=s?s.title||"":"";E("rk").value=kw;E("retryRes").innerHTML="";E("retryModal").style.display="flex"}
function showRetry(){var is=ids();if(is.length!==1){toast("请选择一首");return}S.retryId=is[0];E("ra").value="";E("rt").value="";E("rk").value="";E("retryRes").innerHTML="";E("retryModal").style.display="flex"}
function closeRetry(){E("retryModal").style.display="none";S.retryId=0}
async function doRetry(){var id=S.retryId;if(!id)return;var art=E("ra").value.trim(),tit=E("rt").value.trim(),kw=E("rk").value.trim()||(art+" "+tit);if(!kw){toast("请输入关键词");return}try{var r=await af("./scrape/manual/"+id,{method:"POST",body:JSON.stringify({keyword:kw,artist:art,title:tit})}),d=await r.json();if(d.error){E("retryRes").innerHTML='<div style="color:var(--err);font-size:12px">'+esc(d.error)+'</div>';return}var sc=d.sourceScores?Object.entries(d.sourceScores).map(e=>e[0]+":"+e[1].toFixed(2)).join(", "):"";E("retryRes").innerHTML='<div style="padding:6px"><b>'+esc(d.artist)+' - '+esc(d.title)+'</b><br>album: '+esc(d.album||"")+'<br>源: '+d.source+' ('+d.score.toFixed(2)+')<br>'+sc+'<br><button class="btn btn-p" data-art="'+escH(d.artist)+'" data-tit="'+escH(d.title)+'" data-alb="'+escH(d.album||"")+'" data-sid="'+id+'" onclick="applyR(this)" style="margin-top:4px;font-size:11px;padding:4px 12px">写入</button></div>'}catch(e){E("retryRes").innerHTML='<div style="color:var(--err);font-size:12px">'+esc(e.message)+'</div>'}}
async function applyR(el){var id=parseInt(el.dataset.sid),art=el.dataset.art,tit=el.dataset.tit,alb=el.dataset.alb;closeRetry();S.busy=true;setP(true,0);try{var r=await af("./tags/"+id,{method:"PUT",body:JSON.stringify({title:tit,artist:art,album:alb})}),d=await r.json();if(d.error){log("写入失败:"+d.error,"e");toast("失败")}else{log("ok "+art+" - "+tit+" | "+d.file_write,"ok");toast("写入成功");S.failedSongs=S.failedSongs.filter(f=>f.id!==id);try{await af("./storage/failed",{method:"POST",body:JSON.stringify(S.failedSongs)})}catch(e){}renderFailed();await loadSongs()}}catch(e){log("错误:"+e.message,"e")}S.busy=false;setP(false,100)}

/* ===========================================================================================
   EDIT TAB
   =========================================================================================== */
function showEdit(){
  E("dRoot").innerHTML=E("mRoot").innerHTML='<div style="padding:16px;overflow-y:auto;flex:1"><div style="max-width:700px;margin:0 auto"><h3 style="font-size:13px;color:var(--fg2);margin-bottom:10px">标签编辑</h3><div style="display:flex;gap:5px;margin-bottom:8px"><input id="eq" placeholder="搜索歌曲..." onkeydown="if(event.key===\'Enter\')loadEditView()" style="flex:1;min-width:120px;padding:6px 10px;border-radius:7px;border:1px solid var(--brd);background:var(--bg2);color:var(--fg);outline:none;font-size:12px"><button class="btn btn-s" onclick="loadEditView()"><span class="mi">search</span></button></div><div id="editSongList" style="max-height:200px;overflow-y:auto;margin-bottom:8px"><div class="empty">搜索歌曲</div></div><div id="editPanel" style="display:none;margin-top:8px;padding:12px;border:1px solid var(--brd);border-radius:10px;background:var(--bg2)"><div style="display:flex;gap:8px;margin-bottom:8px"><div id="editCover" style="width:72px;height:72px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0"><span class="mi">music_note</span></div><div style="flex:1"><div class="fld"><label>标题</label><input id="ef_tit"></div><div class="fld"><label>艺术家</label><input id="ef_art"></div><div class="fld"><label>专辑</label><input id="ef_alb"></div><div class="fld"><label>流派</label><input id="ef_gen"></div><div class="fld"><label>歌词</label><textarea id="ef_lyr"></textarea></div><div style="display:flex;gap:5px"><button class="btn btn-p" onclick="saveEditPanel()"><span class="mi">save</span>保存</button><button class="btn btn-s" onclick="scrapeEdit()"><span class="mi">search</span>刮削这首歌</button></div></div></div></div></div></div>';
}
function loadEditView(){var kw=(E("eq")||{}).value||"",src=S._allSongs||S.songs,kwl=kw.trim().toLowerCase();var songs=kwl?src.filter(s=>(s.title||"").toLowerCase().indexOf(kwl)>=0||(s.artist||"").toLowerCase().indexOf(kwl)>=0||(s.album||"").toLowerCase().indexOf(kwl)>=0):src;var c=E("editSongList");if(!c)return;if(!songs.length){c.innerHTML='<div class="empty">无匹配</div>';return}c.innerHTML=songs.map(s=>{var sl=S_editId===s.id?' sel':'';return'<div class="srow'+sl+'" onclick="selectEdit('+s.id+')"><div class="sinfo"><div class="t">'+esc(s.title||"?")+'</div><div class="u">'+esc(s.artist||"?")+(s.album?" · "+esc(s.album):"")+" · "+fm(s.duration)+(s.format?" · "+esc(s.format):"")+'</div></div></div>'}).join("")}
async function selectEdit(id){S_editId=id;var s=findSong(id);E("ef_tit").value=s?s.title||"":"";E("ef_art").value=s?s.artist||"":"";E("ef_alb").value=s?s.album||"":"";E("editPanel").style.display="";loadEditView();try{var r=await af("./song/"+id),d=await r.json();if(!d.error){E("ef_gen").value=d.genre||"";E("ef_lyr").value=d.lyrics||"";var cov=E("editCover");if(d.cover_url)cov.innerHTML='<img src="'+escH(d.cover_url)+'" style="width:100%;height:100%;object-fit:cover">';else cov.innerHTML='<span class="mi">music_note</span>'}}catch(e){}}
async function saveEditPanel(){if(!S_editId)return;var tit=E("ef_tit").value.trim(),art=E("ef_art").value.trim(),alb=E("ef_alb").value.trim(),gen=E("ef_gen").value.trim(),lyr=E("ef_lyr").value;try{var r=await af("./tags/"+S_editId,{method:"PUT",body:JSON.stringify({title:tit,artist:art,album:alb,genre:gen,lyrics:lyr})});if(r.ok){toast("已保存");var s=findSong(S_editId);if(s){s.title=tit;s.artist=art;s.album=alb;s.genre=gen;s.lyrics=lyr}S.failedSongs=S.failedSongs.filter(f=>f.id!==S_editId);try{await af("./storage/failed",{method:"POST",body:JSON.stringify(S.failedSongs)})}catch(e){}renderFailed()}}catch(e){toast("错误:"+e.message)}}
async function scrapeEdit(){if(S.busy)return;if(!S_editId)return;S.busy=true;setP(true,0);var d=await _sc(S_editId);S.busy=false;setP(false,100);if(d){selectEdit(S_editId);toast("完成")}}

/* ===========================================================================================
   BATCH RESUME
   =========================================================================================== */
function resumeBatch(){
  var taskId=localStorage.getItem("batchTaskId");if(!taskId)return;
  var t=parseInt(localStorage.getItem("batchTotal"))||0;S.busy=true;$$("btnStop").disabled=false;setP(true,0);
  var pe=$$("ptxt");if(pe)pe.textContent="0/"+t;log("恢复批量...");S._loggedCnt=-1;
  S._pollId=setInterval(async function(){try{var pr=await af("./scrape/batch/progress?taskId="+taskId);if(!pr.ok){stopBatch();return}var pd=await pr.json();if(pd.error){stopBatch();return}setP(true,Math.round(pd.current/pd.total*100));var pe=$$("ptxt");if(pe)pe.textContent=pd.current+"/"+pd.total;if(pd.lastLog&&pd.loggedCount!=S._loggedCnt){log(pd.lastLog.replace("| skipped","| ok (no change)"));S._loggedCnt=pd.loggedCount}if(pd.status==="done"){clearInterval(S._pollId);S._pollId=0;localStorage.removeItem("batchTaskId");localStorage.removeItem("batchTotal");setP(true,100);var pe2=$$("ptxt");if(pe2)pe2.textContent="";$$("btnStop").disabled=true;(pd.failedIds||[]).forEach(id=>addFailed(id,"failed"));var dl=0;(pd.results||[]).forEach(r=>{if(S._loggedCnt===undefined||dl>=S._loggedCnt)log(r.artist+" - "+r.title+" | "+r.source+" | "+(r.fileWriteStatus==="skipped"?"ok (no change)":r.fileWriteStatus),"ok");dl++});log("完成: 成功"+pd.success+" 失败"+pd.failed+" 跳过"+pd.skipped);toast("成功"+pd.success);await loadSongs();S.busy=false}}catch(e2){stopBatch()}},2000);
}

/* ===========================================================================================
   DOC
   =========================================================================================== */
async function showDoc(type){var u="https://raw.githubusercontent.com/songloft-org/songloft-plugin-tag/main/"+(type==="README"?"README.md":"CHANGELOG.md");E("docTitle").textContent=type;E("docBody").innerHTML='<div style="color:var(--fg2);text-align:center;padding:20px">加载中…</div>';E("docModal").style.display="flex";try{var r=await fetch(u);if(!r.ok){E("docBody").innerHTML='<div style="color:var(--err)">加载失败 (HTTP '+r.status+')</div>';return}var raw=await r.text();E("docBody").innerHTML=md2html(raw)}catch(e){E("docBody").innerHTML='<div style="color:var(--err)">'+esc(e.message)+'</div>'}}
function closeDoc(){E("docModal").style.display="none"}
function md2html(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/^### (.+)/gm,"<h4 style='margin:12px 0 4px'>$1</h4>").replace(/^## (.+)/gm,"<h3 style='margin:16px 0 6px;color:var(--pri)'>$1</h3>").replace(/^# (.+)/gm,"<h2 style='margin:20px 0 8px;color:var(--pri)'>$1</h2>").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"<code style='background:var(--bg2);padding:1px 4px;border-radius:3px'>$1</code>").replace(/^- (.+)/gm,"<li style='margin-left:16px'>$1</li>").replace(/\|(.+)\|/g,function(m){var cells=m.split("|").filter(c=>c.trim());if(cells.every(c=>/^[-: ]+$/.test(c.trim())))return"";return"<div style='display:flex;gap:0'>"+cells.map(c=>"<div style='flex:1;padding:2px 6px;border:1px solid var(--brd)'>"+c.trim()+"</div>").join("")+"</div>"}).replace(/\[([^\]]+)\]\(([^)]+)\)/g,"<a href='$2' target='_blank' style='color:var(--pri)'>$1</a>").replace(/\n\n/g,"<br><br>")}

/* ===========================================================================================
   BOOTSTRAP
   =========================================================================================== */
function setupMobileHdr(){
  if(isMb()){
    E("hBtnReadme").style.display="none";E("hBtnClog").style.display="none";
    if(!E("hBtnMore")){
      var mb=document.createElement("button");mb.className="btn";mb.id="hBtnMore";mb.style.cssText="margin-left:auto;width:auto;min-width:unset";
      mb.innerHTML='<span class="mi">more_vert</span>';
      var hdr=document.querySelector(".hdr");if(hdr)hdr.appendChild(mb);
      var mm=document.createElement("div");mm.id="hMoreMenu";mm.style.cssText="display:none;position:fixed;right:8px;top:36px;background:var(--bg3);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:200;min-width:130px;overflow:hidden;border:1px solid var(--brd)";
      mm.innerHTML='<button style="display:block;width:100%;padding:8px 12px;border:none;background:none;color:var(--fg);font-size:11px;text-align:left;cursor:pointer" onclick="showDoc(\'README\');E(\'hMoreMenu\').style.display=\'none\'"><span class="mi" style="font-size:14px">description</span> README</button><button style="display:block;width:100%;padding:8px 12px;border:none;background:none;color:var(--fg);font-size:11px;text-align:left;cursor:pointer" onclick="showDoc(\'CHANGELOG\');E(\'hMoreMenu\').style.display=\'none\'"><span class="mi" style="font-size:14px">history</span> 改动日志</button>';
      document.body.appendChild(mm);
      mb.onclick=function(){var m=E("hMoreMenu");if(m)m.style.display=m.style.display==="none"?"block":"none"};
    }
  } else {
    E("hBtnReadme").style.display="";E("hBtnClog").style.display="";
    var mb,mm;if(mb=E("hBtnMore"))mb.remove();if(mm=E("hMoreMenu"))mm.remove();
  }
}

var _lastMobile;
function buildLayout(){
  if(isMb()){E("dRoot").innerHTML="";E("dRoot").style.display="none";E("mRoot").style.display="flex";buildMobile()}
  else{E("mRoot").innerHTML="";E("mRoot").style.display="none";E("dRoot").style.display="flex";buildDesktop()}
  _lastMobile=isMb();setupMobileHdr()
}

window.onload=async function(){
  buildLayout();await loadCfg();await chkSources();await loadSongs();await loadFailed();resumeBatch();
  window.addEventListener("resize",function(){if(_lastMobile!==isMb()){buildLayout();loadCfg().then(()=>chkSources());loadSongs().then(()=>loadFailed())}setupMobileHdr()});
};
</script>
